{% extends 'layout.html'%}

{% block content %}
    <section id="todos">
        <header>
            <h2>Editing '{{ lst.title }}'</h2>
        </header>
        <ul>
            <li>
                <form class="delete" action="lists/{{ lst.id }}/delete" method="post">
                    <buttom type="submit" class="delete">Delete List</buttom>
                </form>
            </li>
        </ul>
    </section>

    <form action="/lists/{{ lst.id }}" method="post">
        <dl>
            <dt>
                <label for="list_title">Enter a new list title:</label>
            </dt>
            <dd>
                <input type="text" name="list_title" placeholder="List Title"
                   value="{{ title if title is defined else lst.title }}">
            </dd>
        </dl>
        <fieldset class="actions">
            <input type="submit" value="Save">
            <a href="{{ url_for ('show_list', list_id=list_id) }}">Cancel</a>
        </fieldset>        
    </form>

{% endblock %}
